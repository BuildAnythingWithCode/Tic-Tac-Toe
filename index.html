<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="flex column center">
    <h1>Welcome to Tic Tac Toe!</h1>
    <h2>Take turns playing against each other.</h2>
    <div id="grid">
      <div class="cell cell-one">1</div>
      <div class="cell cell-two">2</div>
      <div class="cell cell-three">3</div>
      <div class="cell cell-four">4</div>
      <div class="cell cell-five">5</div>
      <div class="cell cell-six">6</div>
      <div class="cell cell-seven">7</div>
      <div class="cell cell-eight">8</div>
      <div class="cell cell-nine">9</div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
